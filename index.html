<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVO Pack — Официальный сайт</title>
    <style>
        /* Общие стили в темных тонах лаунчера */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1A1B1C;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Контейнер сайта */
        .container {
            max-width: 900px;
            width: 90%;
            text-align: center;
            padding: 40px 20px;
        }

        /* Анимированный заголовок (эффект Пульсации) */
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse-animation 3s infinite ease-in-out;
        }

        p.subtitle {
            color: #aaaaaa;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        /* Сетка для твоих фотографий */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }

        /* Стиль для картинок с закруглением как в лаунчере */
        .gallery-item {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 24px; /* Фирменное мягкое закругление */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.3);
        }

        /* Большая геймерская кнопка скачать */
        .download-btn {
            display: inline-block;
            background-color: #3b82f6; /* Твой синий цвет */
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            padding: 18px 50px;
            border-radius: 16px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .download-btn:hover {
            background-color: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* Магия анимации пульсации для текста */
        @keyframes pulse-animation {
            0% { color: #FFFFFF; }
            50% { color: #3b82f6; } /* Плавно переливается в синий */
            100% { color: #FFFFFF; }
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #555555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SVO PACK</h1>
        <p class="subtitle">Уникальная милитари сборка Minecraft. Готовься к бою!</p>

        <div class="gallery">
            <img src="photo1.png" alt="Зона боевых действий" class="gallery-item">
            <img src="photo2.webp" alt="Солдат" class="gallery-item">
        </div>

        <a href="https://www.dropbox.com/scl/fi/q8rl77v4cidsnll9iyrvy/SVO.exe?rlkey=sokgz9ji2l2f2y7bko0ekvbrm&st=o9edphmi&dl=1" class="download-btn">Скачать Лаунчер</a>
    </div>

    <footer>
        &copy; 2026 SVO Launcher. Создано Pidoras Entertainment. 
    </footer>

</body>
</html>
